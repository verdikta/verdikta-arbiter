[Log]
Level="warn"
 
[WebServer]
AllowOrigins="*"
SecureCookies=false

[WebServer.TLS]
HTTPSPort=0

[[EVM]]
ChainID=<CHAIN_ID>
Enabled=true
MinContractPayment="0"

# P0-A (July 2026 incident): decouple finality-tag staleness from RPC liveness.
# Base's `finalized` tag intermittently stalls/regresses chain-wide, so every
# provider reflects the same bad signal at once. With the chain default
# (NoNewFinalizedHeadsThreshold = 15m on Base mainnet), a stalled tag marks
# ALL nodes FinalizedBlockOutOfSync -> 0 live nodes -> commit txs cannot be
# broadcast even though regular heads keep advancing. A commit/reveal oracle
# only needs tx submission and log/head reads, so disable the finalized-head
# staleness kill entirely. Truly dead RPCs are still caught by the regular
# head check (NoNewHeadsThreshold, 40s chain default) and pool poll checks.
NoNewFinalizedHeadsThreshold = '0s'

[EVM.GasEstimator]
Mode = "FeeHistory"
TipCapDefault = "<TIP_CAP_DEFAULT>"
TipCapMin     = "30000000"       # 0.03 gwei
FeeCapDefault = "<FEE_CAP_DEFAULT>"
# EstimateLimit = true

[EVM.HeadTracker]
SamplingInterval = "30s"            # coalesce heads
HistoryDepth = 25

[EVM.NodePool]
PollInterval   = "80s"
NewHeadsPollInterval = "30s"
SyncThreshold = 10
# P0-A companion: EnforceRepeatableRead=true (default) marks an RPC
# FinalizedBlockOutOfSync when its finalized block lags or regresses vs. the
# highest one observed ("Received finalized block older than one already
# processed" in the incident logs). Same chain-level finality signal, same
# 0-live outcome; disable so finality wobble cannot disable tx submission.
EnforceRepeatableRead = false

 
[EVM.Transactions]
ReaperInterval = "30m"              # Less frequent cleanup
ReaperThreshold = "168h"            # Keep txns longer before cleanup
MaxInFlight = 32
MaxQueued = 64

<EVM_NODES_BLOCK>

[JobPipeline.HTTPRequest]
DefaultTimeout = "300s"

