name: Secret Scan

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

permissions:
  contents: read

jobs:
  gitleaks:
    name: Gitleaks Secret Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  tracked-env-check:
    name: Reject Tracked .env Files
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Fail if real .env files are tracked
        run: |
          tracked_env=$(git ls-files | grep -E '(^|/)\.env$' || true)
          if [ -n "$tracked_env" ]; then
            echo "::error::Real .env files are tracked in git:"
            echo "$tracked_env"
            exit 1
          fi
          echo "No tracked .env files found."
